<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>适配度 — 承认吧，你就是_____</title>
  <link rel="stylesheet" href="style.css?v=20260529">
  <link rel="stylesheet" href="compatibility.css?v=20260601b">

  <!-- ====== 手机端内联样式（绕过所有缓存） ====== -->
  <style id="inline-mobile-style">
    html.is-mobile .comp-list {
      display: flex !important;
      flex-direction: column !important;
      gap: 8px !important;
      padding: 8px 10px 40px !important;
    }
    html.is-mobile .comp-card {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      gap: 10px !important;
      padding: 10px 10px !important;
      border-radius: 12px !important;
      overflow: visible !important;
      flex-wrap: nowrap !important;
    }
    html.is-mobile .comp-card:hover { transform: none !important; }
    html.is-mobile .comp-card:active { transform: scale(0.98) !important; }
    html.is-mobile .comp-card::after {
      top: 6px !important; bottom: 6px !important;
      width: 4px !important;
      border-radius: 0 4px 4px 0 !important;
    }
    html.is-mobile .comp-card::before {
      background: radial-gradient(circle at 0% 50%, rgba(168,85,247,0.06) 0%, transparent 60%) !important;
    }
    /* 头像 → 圆形小图 */
    html.is-mobile .comp-portrait {
      width: 44px !important;
      height: 44px !important;
      aspect-ratio: auto !important;
      border-radius: 50% !important;
      margin-bottom: 0 !important;
      flex-shrink: 0 !important;
      border-width: 1.5px !important;
    }
    /* 信息区 */
    html.is-mobile .comp-body {
      display: flex !important;
      flex-direction: column !important;
      gap: 1px !important;
      flex: 1 1 0% !important;
      min-width: 0 !important;
    }
    /* 星标行 */
    html.is-mobile .comp-rank {
      display: flex !important;
      align-items: center !important;
      gap: 4px !important;
      margin-bottom: 2px !important;
      min-height: 20px !important;
    }
    html.is-mobile .rank-emoji {
      font-size: 0.85rem !important;
      line-height: 1.3 !important;
      flex-shrink: 0 !important;
    }
    html.is-mobile .rank-label {
      font-size: 0.55rem !important;
      flex-shrink: 0 !important;
    }
    html.is-mobile .comp-score-badge {
      font-size: 0.55rem !important;
      padding: 1px 6px !important;
      flex-shrink: 0 !important;
    }
    /* 名字 */
    html.is-mobile .comp-target-name {
      font-size: 0.88rem !important;
      margin-bottom: 1px !important;
      line-height: 1.2 !important;
    }
    /* 描述 */
    html.is-mobile .comp-desc {
      display: block !important;
      font-size: 0.64rem !important;
      line-height: 1.3 !important;
      white-space: nowrap !important;
      text-overflow: ellipsis !important;
      overflow: hidden !important;
      margin-bottom: 0 !important;
    }
    /* 手机端绝不展开卡片行内详情 */
    html.is-mobile .comp-card .comp-detail {
      display: none !important;
    }

    /* 弹窗样式（移动端动画） */
    @keyframes cardInMobile {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    html.is-mobile .comp-card {
      animation-name: cardInMobile !important;
    }

    /* ---- 弹窗 overlay ---- */
    .comp-modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(7,6,13,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0;
      opacity: 0; pointer-events: none;
      transition: opacity 0.28s ease;
    }
    .comp-modal-overlay.active {
      opacity: 1; pointer-events: auto;
    }
    .comp-modal-card {
      position: relative;
      width: 100%; max-width: 440px;
      max-height: 82vh; overflow-y: auto;
      padding: 28px 20px 32px;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(168,85,247,0.15);
      border-bottom: none;
      background: rgba(18,14,36,0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 -8px 60px rgba(168,85,247,0.12), 0 -2px 120px rgba(0,0,0,0.4);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .comp-modal-overlay.active .comp-modal-card {
      transform: translateY(0);
    }
    .comp-modal-close {
      position: absolute; top: 12px; right: 14px;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(168,85,247,0.2);
      background: rgba(255,255,255,0.03);
      color: rgba(200,190,220,0.6); font-size: 1rem; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .comp-modal-close:active {
      border-color: rgba(192,132,252,0.5);
      color: #c084fc;
      box-shadow: 0 0 14px rgba(192,132,252,0.2);
    }
    .comp-modal-portrait {
      display: block;
      width: 80px; height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px;
      border: 2px solid rgba(168,85,247,0.3);
      box-shadow: 0 0 24px rgba(168,85,247,0.2);
    }
    .comp-modal-name {
      text-align: center;
      font-size: 1.5rem; font-weight: 900;
      color: #f3f0f9; letter-spacing: 0.04em;
      margin-bottom: 8px;
      text-shadow: 0 0 18px rgba(192,132,252,0.35);
    }
    .comp-modal-rank {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: 16px;
      font-size: 0.82rem;
    }
    .comp-modal-rank .rank-emoji { font-size: 1rem; line-height: 1.3; }
    .comp-modal-rank .rank-label {
      font-size: 0.68rem; font-weight: 700;
      color: rgba(192,132,252,0.7);
      letter-spacing: 0.06em;
    }
    .comp-modal-rank .comp-score-badge {
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 8px; border-radius: 8px;
      color: rgba(180,170,200,0.55);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,85,247,0.12);
      font-family: "SF Mono","JetBrains Mono","Cascadia Code","Consolas",monospace;
    }
    .comp-modal-detail {
      font-size: 0.85rem; line-height: 1.85;
      color: rgba(226,215,240,0.65);
      letter-spacing: 0.02em;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(168,85,247,0.04);
      border: 1px solid rgba(168,85,247,0.08);
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scanlines"></div>
  <canvas id="particles"></canvas>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- 头部 -->
  <header class="comp-header" id="compHeader">
    <a href="result.html" class="back-btn">
      <span class="back-arrow">←</span>
      <span>返回审判书</span>
    </a>

    <div class="user-card" id="userCard">
      <div class="user-card-label">你的人格</div>
      <div class="user-card-name" id="userName">_____</div>
      <div class="user-card-knife" id="userKnife"></div>
    </div>

    <div class="header-ornament">
      <span class="orn-line"></span>
      <span class="orn-symbol">🔗</span>
      <span class="orn-line"></span>
    </div>
    <h2 class="section-heading">与你的人格适配度</h2>
    <p class="section-sub">16 种人格 · 120 组关系 · 你的 15 种可能性 <span style="color:#7ec8c0;font-size:0.55rem;" id="verTag"></span></p>
  </header>

  <!-- 适配度列表 -->
  <main class="comp-list" id="compList"></main>

  <!-- 底部图鉴入口 -->
  <footer class="comp-footer">
    <a href="gallery.html" class="footer-link">查看全部 16 种人格图鉴 →</a>
  </footer>

  <!-- ====== 手机端内联脚本（绕过缓存） ====== -->
  <script>
  (function(){
    // 手机检测：宽度 < 768 或支持触摸（微信浏览器兼容）
    var IS_MOBILE = window.innerWidth < 768 || ('ontouchstart' in window);
    if (IS_MOBILE) {
      document.documentElement.classList.add('is-mobile');
    }
    // 版本标记
    var vt = document.getElementById('verTag');
    if (vt) vt.textContent = 'v0601c ' + (IS_MOBILE ? '📱' : '💻') + ' w' + window.innerWidth;

    // 劫持 compatibility.js 渲染完成后的卡片点击
    // 用 MutationObserver 监听卡片生成，替换点击行为
    function bindMobileCards() {
      var list = document.getElementById('compList');
      if (!list) return;
      var cards = list.querySelectorAll('.comp-card');
      for (var i = 0; i < cards.length; i++) {
        (function(card){
          // 移除旧事件（通过克隆节点）
          var newCard = card.cloneNode(true);
          card.parentNode.replaceChild(newCard, card);

          function showModal() {
            if (!IS_MOBILE) return;
            var name = newCard.querySelector('.comp-target-name').textContent;
            var img = newCard.querySelector('.comp-portrait').src;
            var rankHTML = newCard.querySelector('.comp-rank').innerHTML;
            var detail = newCard.querySelector('.comp-detail').textContent;

            var overlay = document.createElement('div');
            overlay.className = 'comp-modal-overlay';
            overlay.innerHTML =
              '<div class="comp-modal-card">' +
              '<button class="comp-modal-close">&times;</button>' +
              '<img class="comp-modal-portrait" src="' + img + '" alt="' + name + '">' +
              '<h3 class="comp-modal-name">' + name + '</h3>' +
              '<div class="comp-modal-rank">' + rankHTML + '</div>' +
              '<div class="comp-modal-detail">' + detail + '</div>' +
              '</div>';

            document.body.appendChild(overlay);
            requestAnimationFrame(function(){ overlay.classList.add('active'); });

            function close() {
              overlay.classList.remove('active');
              setTimeout(function(){
                if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
              }, 300);
            }
            overlay.querySelector('.comp-modal-close').addEventListener('click', close);
            overlay.addEventListener('click', function(e){ if(e.target===overlay) close(); });
            overlay.addEventListener('touchend', function(e){ if(e.target===overlay){ e.preventDefault(); close(); }});
          }

          newCard.addEventListener('click', function(e){
            if (IS_MOBILE) { e.stopPropagation(); showModal(); }
          });
          newCard.addEventListener('touchend', function(e){
            if (IS_MOBILE) { e.preventDefault(); e.stopPropagation(); showModal(); }
          });
        })(cards[i]);
      }
    }

    // 轮询等待卡片渲染完成，最多等 5 秒
    var attempts = 0;
    var poll = setInterval(function(){
      attempts++;
      var cards = document.querySelectorAll('#compList .comp-card');
      if (cards.length > 0) {
        clearInterval(poll);
        bindMobileCards();
      } else if (attempts > 50) {
        clearInterval(poll);
      }
    }, 100);
  })();
  </script>

  <script src="script.js?v=20260529"></script>
  <script src="compatibility.js?v=20260601b"></script>
</body>
</html>
