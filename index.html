<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>承认吧，你就是_____</title>
  <link rel="stylesheet" href="style.css?v=20260529">
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scanlines"></div>
  <canvas id="particles"></canvas>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <div class="deco-geo deco-ring-1"></div>
  <div class="deco-geo deco-ring-2"></div>
  <div class="deco-geo deco-diamond"></div>
  <div class="deco-geo deco-cross"></div>
  <div class="deco-line deco-line-top"></div>
  <div class="deco-line deco-line-bottom"></div>

  <main class="container">
    <div class="title-ornament">
      <span class="ornament-bracket">&lt;</span>
      <span class="ornament-dot">·</span>
      <span class="ornament-bracket">&gt;</span>
    </div>

    <div class="title-block glass">
      <h1 class="title">
        承认吧，你就是<span class="title-blank" id="titleBlank">_____</span>
      </h1>
    </div>

    <div class="title-divider">
      <span class="divider-line"></span>
      <span class="divider-icon">◇</span>
      <span class="divider-line"></span>
    </div>

    <p class="subtitle">
      30 道题 · 16 种人格 · 1 个不在列表里的隐藏结果<br>
      选完不能回头。你想好了吗？
    </p>

    <button class="btn-start glass" id="btnStart">
      <span class="btn-text">开始答题</span>
      <span class="btn-glow"></span>
    </button>

    <p class="footer-hint">
      已有 <span id="counter">83,729</span> 人发现自己是什么玩意儿
    </p>
  </main>

  <script src="script.js?v=20260529"></script>
</body>
</html>
