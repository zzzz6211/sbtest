<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>统计仪表盘 — 承认吧，你就是_____</title>
  <link rel="stylesheet" href="style.css?v=20260529">
  <link rel="stylesheet" href="admin.css?v=20260531">
</head>
<body>

  <div class="grid-bg"></div>
  <div class="scanlines"></div>
  <canvas id="particles"></canvas>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="admin-container">

    <!-- 头部 -->
    <header class="admin-header">
      <a href="index.html" class="back-btn">
        <span class="back-arrow">←</span>
        <span>返回首页</span>
      </a>
      <div class="header-ornament">
        <span class="orn-line"></span>
        <span class="orn-symbol">◆</span>
        <span class="orn-line"></span>
      </div>
      <h1 class="header-title">统计仪表盘</h1>
      <p class="header-sub">CONFIDENTIAL · 答题数据实时分析</p>
    </header>

    <!-- 概览卡片 -->
    <section class="stat-cards" id="statCards">
      <div class="stat-card glass">
        <div class="stat-value" id="statTotal">--</div>
        <div class="stat-label">总测试数</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-value" id="statToday">--</div>
        <div class="stat-label">今日新增</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-value" id="statEgg">--</div>
        <div class="stat-label">彩蛋触发率</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-value" id="statMatch">--</div>
        <div class="stat-label">平均维度契合</div>
      </div>
    </section>

    <!-- 人格分布 -->
    <section class="chart-section glass">
      <div class="section-head">
        <span class="section-icon">📊</span>
        <span class="section-title">人格分布</span>
        <span class="section-hint" id="personaHint"></span>
      </div>
      <div class="bar-chart" id="personaChart">
        <div class="chart-placeholder">加载中...</div>
      </div>
    </section>

    <!-- 按题答案分布 -->
    <section class="chart-section glass">
      <div class="section-head">
        <span class="section-icon">📈</span>
        <span class="section-title">按题答案分布</span>
        <span class="section-hint" id="questionHint"></span>
      </div>
      <div class="questions-wrap" id="questionsChart">
        <div class="chart-placeholder">加载中...</div>
      </div>
    </section>

    <!-- 六维分数分布 -->
    <section class="chart-section glass">
      <div class="section-head">
        <span class="section-icon">📐</span>
        <span class="section-title">六维分数分布</span>
        <span class="section-hint" id="dimHint"></span>
      </div>
      <div class="dimensions-grid" id="dimensionsChart">
        <div class="chart-placeholder">加载中...</div>
      </div>
    </section>

    <!-- 每日趋势 -->
    <section class="chart-section glass">
      <div class="section-head">
        <span class="section-icon">📅</span>
        <span class="section-title">近30日趋势</span>
      </div>
      <div class="timeline-chart" id="timelineChart">
        <div class="chart-placeholder">加载中...</div>
      </div>
    </section>

    <footer class="admin-footer">
      <a href="index.html" class="footer-link">返回首页</a>
      <span class="footer-divider">·</span>
      <span class="footer-link footer-refresh" id="btnRefresh">刷新数据</span>
    </footer>

  </main>

  <script src="script.js?v=20260529"></script>
  <script src="admin.js?v=20260531"></script>
</body>
</html>
